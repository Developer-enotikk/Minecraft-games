<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Minecraft – Информационный сайт</title>

    <style>
        :root {
            /* 👉 ТВОЯ ФОНОВАЯ КАРТИНКА */
            --background-image: url('./bg.png');
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-image: var(--background-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        /* ----- ШАПКА ----- */
        header {
            position: relative;
            padding: 20px 30px;
            background: rgba(0,0,0,0.65);
            border-bottom: 3px solid #46bb44;
            text-align: center; /* Центрируем заголовок */
        }

        h1 {
            margin: 0;
            font-size: 30px;
            color: #46bb44;
            text-shadow: 0 0 6px black;
        }

        /* Кнопки справа в углу */
        .top-buttons {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 10px;
        }

        .top-btn {
            background: #46bb44;
            padding: 10px 12px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
            white-space: nowrap;
        }

        .top-btn:hover {
            background: #58d957;
        }

        /* ----- Контент ----- */
        .container {
            max-width: 900px;
            margin: auto;
            padding: 25px;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 12px;
            margin-top: 30px;
        }

        /* ----- Счётчик посетителей ----- */
        #counter-box {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 15px;
            border: 2px solid #3ea33c;
            box-shadow: 0 0 10px #3ea33c;
            font-weight: bold;
        }

        /* 📱 Мобильная версия */
        @media (max-width: 600px) {
            .top-buttons {
                position: static;
                transform: none;
                justify-content: center;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Minecraft – Информациоя</h1>

    <div class="top-buttons">
     
    </div>
</header>

<div class="container">
    <h2>Добро пожаловать! сайт дорабатывается!</h2>
    <p>
        Сайт в разработке - сдесь будут сборки разных версий Minecraft ;>
        
    </p>
</div>

<!-- СЧЁТЧИК ПОСЕТИТЕЛЕЙ -->
<div id="counter-box">👤 Посетителей: <span id="counter-num">...</span></div>

<script>
    async function loadCounter() {
        let namespace = "minecraft-info-site"; 
        let key = "visitors";

        let res = await fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`);
        let data = await res.json();
        document.getElementById("counter-num").innerText = data.value;
    }
    loadCounter();
</script>

</body>
</html>
